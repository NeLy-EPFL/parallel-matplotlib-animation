site_name: Parallel Matplotlib Animation
site_url: https://sibocw.github.io/parallel-matplotlib-animation/
repo_url: https://github.com/sibocw/parallel-matplotlib-animation
repo_name: sibocw/parallel-matplotlib-animation

theme:
  name: material
  features:
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

hooks:
  - docs/gen_benchmark.py

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"]
          options:
            docstring_style: google
            merge_init_into_class: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            separate_signature: true
            show_signature_annotations: true
            members_order: source
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Examples: examples.md
  - API Reference: api/animator.md
  - Benchmark: benchmark.md
  - Developer Info: developer.md
